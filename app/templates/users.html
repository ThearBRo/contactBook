{% extends 'layout/base.html' %} {% block title %}Users — ContactBook{% endblock
%} {% block content %}
<div class="row">
  <div class="col-md-8">
    <div class="card card-dim p-3 animate__animated animate__fadeInUp">
      <h5>Registered Users</h5>
      <ul class="list-group list-group-flush mt-3">
        {% for u in users %}
        <li
          class="list-group-item d-flex justify-content-between align-items-center"
        >
          <div>
            <div class="fw-semibold">{{ u.username }}</div>
            <div class="small text-muted">{{ u.email }}</div>
          </div>
          <div class="text-muted small">{{ u.contacts.count() }} contacts</div>
        </li>
        {% else %}
        <li class="list-group-item text-muted">No users yet.</li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>
{% endblock %}
